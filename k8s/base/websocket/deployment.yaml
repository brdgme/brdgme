---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket
  labels:
    app: websocket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket
  template:
    metadata:
      labels:
        app: websocket
    spec:
      containers:
        - name: websocket
          image: brdgme/websocket
          ports:
            - containerPort: 80
          env:
            - name: REDIS_URL
              value: "redis://redis"
