---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: brdgme/web
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: postgres-config
          env:
            - name: BOT_SERVICE_URL
              value: http://bot:4000
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bot-config
                  key: INTERNAL_API_KEY
