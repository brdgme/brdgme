---
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  annotations:
    # ArgoCD pre-sync hook: runs migrations before any other resources are synced.
    # BeforeHookCreation deletes any previous Job before creating a new one.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      containers:
        - name: migrate
          image: brdgme/migrate
          envFrom:
            - secretRef:
                name: postgres-config
      restartPolicy: Never
