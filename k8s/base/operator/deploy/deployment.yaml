apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator
  labels:
    app: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: operator
  template:
    metadata:
      labels:
        app: operator
    spec:
      serviceAccountName: brdgme-operator
      containers:
        - name: operator
          image: brdgme/operator
          # Port is for the liveness probe only - no readiness probe (the
          # operator takes no Service traffic to gate) and no Service is
          # defined.
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: postgres-config
          env:
            - name: RUST_LOG
              value: info
            - name: LISTEN_ADDR
              value: 0.0.0.0:4000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
