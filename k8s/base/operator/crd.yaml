apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameversions.brdgme.com
spec:
  group: brdgme.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [typeName, playerCounts]
            properties:
              typeName:
                type: string
                description: Human-readable game type name (e.g. "Acquire").
              playerCounts:
                type: array
                items:
                  type: integer
                description: Valid player counts for this game.
              weight:
                type: number
                default: 0
                description: "Game complexity weight: 0 = light, 5 = heavy."
              isDeprecated:
                type: boolean
                default: false
                description: "Deprecated versions cannot start new games but remain running for in-progress games."
          status:
            type: object
            properties:
              ready:
                type: boolean
              message:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Display Name
      type: string
      jsonPath: .spec.typeName
    - name: Players
      type: string
      jsonPath: .spec.playerCounts
  scope: Namespaced
  names:
    plural: gameversions
    singular: gameversion
    kind: GameVersion
    shortNames:
    - gv
