apiVersion: v1
kind: ServiceAccount
metadata:
  name: brdgme-operator
  namespace: brdgme
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: brdgme-operator
rules:
- apiGroups: ["brdgme.com"]
  resources: ["gameversions"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["brdgme.com"]
  resources: ["gameversions/status"]
  verbs: ["patch", "update"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: brdgme-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: brdgme-operator
subjects:
- kind: ServiceAccount
  name: brdgme-operator
  namespace: brdgme
