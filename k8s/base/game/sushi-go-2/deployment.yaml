---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-go-2
spec:
  selector:
    matchLabels:
      app: sushi-go-2
  template:
    metadata:
      labels:
        app: sushi-go-2
    spec:
      containers:
      - name: sushi-go-2
        image: brdgme/sushi-go-2
        env:
        - name: ADDR
          value: "0.0.0.0:8080"
        ports:
        - containerPort: 8080
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
