apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: age-of-war-1
spec:
  hosts:
  - age-of-war-1.games.internal
  scaleTargetRef:
    name: age-of-war-1
    kind: Deployment
    apiVersion: apps/v1
    service: age-of-war-1
    port: 80
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800
