apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: age-of-war-2
spec:
  hosts:
  - age-of-war-2.games.internal
  scaleTargetRef:
    name: age-of-war-2
    kind: Deployment
    apiVersion: apps/v1
    service: age-of-war-2
    port: 80
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800
