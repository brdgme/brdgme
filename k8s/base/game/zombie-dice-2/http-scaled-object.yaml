apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: zombie-dice-2
spec:
  hosts:
  - zombie-dice-2.games.internal
  scaleTargetRef:
    name: zombie-dice-2
    kind: Deployment
    apiVersion: apps/v1
    service: zombie-dice-2
    port: 80
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800
