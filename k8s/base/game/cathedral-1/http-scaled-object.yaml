apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: cathedral-1
spec:
  hosts:
  - cathedral-1.games.internal
  scaleTargetRef:
    name: cathedral-1
    kind: Deployment
    apiVersion: apps/v1
    service: cathedral-1
    port: 80
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800
