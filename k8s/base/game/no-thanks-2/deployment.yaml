---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-thanks-2
spec:
  selector:
    matchLabels:
      app: no-thanks-2
  template:
    metadata:
      labels:
        app: no-thanks-2
    spec:
      containers:
      - name: no-thanks-2
        image: brdgme/no-thanks-2
        ports:
        - containerPort: 80
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi