---
# ClusterIssuer for Let's Encrypt production certificates.
# HTTP01 solver uses the Knative/Kourier ingress class so net-certmanager
# can route ACME challenge requests through Knative routes.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@brdg.me
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
    - http01:
        ingress:
          class: kourier.ingress.networking.knative.dev
