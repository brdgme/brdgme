---
# ClusterIssuer for Let's Encrypt production certificates.
# HTTP01 solver routes ACME challenge requests through the Gateway API
# `brdgme` Gateway (k8s/base/gateway/gateway.yaml) via a gatewayHTTPRoute
# solver, one per hostname listener.
#
# Prerequisite (one-time, not in kustomize - cluster infrastructure):
# cert-manager must be installed with the Gateway API feature enabled
# (Helm: --set config.enableGatewayAPI=true, or pass --enable-gateway-api
# to the controller directly), and the Gateway API CRDs must already exist
# in the cluster.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@brdg.me
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
            - name: brdgme
              namespace: brdgme
              kind: Gateway
              sectionName: web
    - selector:
        dnsNames:
        - legacy.brdg.me
      http01:
        gatewayHTTPRoute:
          parentRefs:
            - name: brdgme
              namespace: brdgme
              kind: Gateway
              sectionName: web-legacy
    - selector:
        dnsNames:
        - api.brdg.me
      http01:
        gatewayHTTPRoute:
          parentRefs:
            - name: brdgme
              namespace: brdgme
              kind: Gateway
              sectionName: api
    - selector:
        dnsNames:
        - ws.brdg.me
      http01:
        gatewayHTTPRoute:
          parentRefs:
            - name: brdgme
              namespace: brdgme
              kind: Gateway
              sectionName: websocket
