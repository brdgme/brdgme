---
# Single Gateway with one HTTPS listener per hostname. TLS certificates are
# issued by cert-manager's Gateway API integration (annotation below), which
# creates one Certificate/Secret per listener automatically.
#
# gatewayClassName assumes the DOKS managed Gateway API implementation
# (Cilium) registers a GatewayClass named "cilium" - this matches the Kind
# dev setup in scripts/setup-kind-cluster.sh. Confirmed 2026-07-05 on the
# `brdgme` prod cluster (GatewayClass/cilium, controller
# io.cilium/gateway-controller, ACCEPTED: True).
#
# Before applying this Gateway in prod (Phase 16), flip
# kube-system/cilium-config's `enable-gateway-api-proxy-protocol` to "true"
# and restart the cilium DaemonSet - otherwise real client IPs are lost
# behind the DO LB (it SNATs; Gateway API's TLS terminates in-cluster so the
# LB never sees HTTP to add X-Forwarded-For itself). The 22a login rate
# limiter keys on client IP and fails open (throttles everyone collectively)
# if this is skipped. See docs/plan/14-drop-knative-gateway-api.md.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: brdgme
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      # Default is 60s. The monolith already pings every 30s
      # (rust/web/src/websocket.rs) to keep long-lived WS connections alive
      # across LB idle timeouts - this just adds margin.
      service.beta.kubernetes.io/do-loadbalancer-http-idle-timeout-seconds: "120"
      # Must not be set until the cilium-config flag above is flipped -
      # otherwise the DO LB speaks PROXY protocol to an Envoy that isn't
      # expecting it and breaks all traffic.
      # service.beta.kubernetes.io/do-loadbalancer-enable-proxy-protocol: "true"
  listeners:
    - name: web-http
      hostname: brdg.me
      port: 80
      protocol: HTTP
    - name: web
      hostname: brdg.me
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - name: brdg-me-tls
    - name: web-legacy
      hostname: legacy.brdg.me
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - name: legacy-brdg-me-tls
    - name: api
      hostname: api.brdg.me
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - name: api-brdg-me-tls
    - name: websocket
      hostname: ws.brdg.me
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - name: ws-brdg-me-tls
    - name: web-beta-http
      hostname: beta.brdg.me
      port: 80
      protocol: HTTP
    - name: web-beta
      hostname: beta.brdg.me
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - name: beta-brdg-me-tls
