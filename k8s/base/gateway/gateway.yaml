---
# Single Gateway with one HTTPS listener per hostname. TLS certificates are
# issued by cert-manager's Gateway API integration (annotation below), which
# creates one Certificate/Secret per listener automatically.
#
# gatewayClassName assumes the DOKS managed Gateway API implementation
# (Cilium) registers a GatewayClass named "cilium" - this matches the Kind
# dev setup in scripts/setup-kind-cluster.sh. Confirmed 2026-07-05 on the
# `brdgme` prod cluster (GatewayClass/cilium, controller
# io.cilium/gateway-controller, ACCEPTED: True).
#
# PROXY protocol is deliberately NOT enabled here. kube-system/cilium-config's
# `enable-gateway-api-proxy-protocol` flag is owned by DOKS's managed addon
# reconciler, which reverts operator edits - verified live 2026-07-08: the
# flag was flipped to "true" and the cilium DaemonSet restarted successfully,
# but the reconciler rewrote it back to "false" ~15 minutes later. Real
# client IPs are therefore not available in-cluster, permanently, not just
# until some future flip lands. Abuse protection is IP-independent instead
# (DB-backed send/attempt caps + post-cutover Cloudflare edge limiting) - see
# docs/superpowers/specs/2026-07-08-28-abuse-protection-design.md.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: brdgme
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      # Default is 60s. The monolith already pings every 30s
      # (rust/web/src/websocket.rs) to keep long-lived WS connections alive
      # across LB idle timeouts - this just adds margin.
      service.beta.kubernetes.io/do-loadbalancer-http-idle-timeout-seconds: "120"
      # WARNING: never set do-loadbalancer-enable-proxy-protocol here. Envoy
      # cannot be made to expect PROXY protocol on DOKS (the cilium-config
      # flag that would tell it to is owned by DOKS's managed reconciler and
      # gets reverted - see the header comment above), so enabling this
      # annotation breaks all Gateway traffic.
  # Only beta.brdg.me is served from this cluster for now. The legacy
  # brdg.me hostnames (apex, legacy, api, ws) stay on the old server; their
  # listeners were removed because their HTTP01 challenges can never
  # complete until DNS points here, leaving certs permanently pending. Add
  # the apex listeners back at DNS cutover.
  listeners:
    - name: web-beta-http
      hostname: beta.brdg.me
      port: 80
      protocol: HTTP
    - name: web-beta
      hostname: beta.brdg.me
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - name: beta-brdg-me-tls
