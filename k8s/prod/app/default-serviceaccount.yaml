# Prod-only; attaches the ghcr-pull secret (sealed in brdgme-config
# sealed-secrets/secrets/, created by the operator - see backlog #41d) to
# the namespace default ServiceAccount so ALL pods (39 game workers, web,
# bot, operator, migrate Job, future scaled pods) pull from GHCR
# authenticated, without touching 40+ base manifests. Missing-secret state
# is harmless (falls back to anonymous pulls with a warning event). Dev
# unaffected - this file is prod-only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: brdgme
imagePullSecrets:
  - name: ghcr-pull
