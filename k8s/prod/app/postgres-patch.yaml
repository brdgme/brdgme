# Prod-only overrides for the shared k8s/base/postgres/cluster.yaml Cluster
# CR (dev keeps the base as-is: no storageClass, 2Gi). See "Implementation
# notes" in docs/superpowers/specs/2026-07-08-19-cloudnativepg-design.md for the storage size/class
# reasoning and the plugins wiring.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  annotations:
    # ArgoCD sync-wave: must be Ready before the migrate Sync-phase hook
    # (sync-wave 1 in k8s/base/migrate/job.yaml) runs.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  # Propagated onto every pod CNPG creates for this Cluster (instance pods),
  # including the standard `cnpg.io/cluster` label - picked up by the
  # `prometheus.io/scrape`-annotation-based discovery in
  # k8s/prod/alloy/configmap.yaml's CNPG scrape job (2026-07-09). CNPG's
  # exporter listens on 9187, path /metrics (the discovery default, no
  # `prometheus.io/path` override needed).
  inheritedMetadata:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9187"
  # Sized 2026-07-16 from observed ~190Mi workingSet (single sample via
  # kubelet Summary API) - revisit after metrics-server (#41a) lands.
  # backlog #41c.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  storage:
    size: 10Gi
    storageClass: do-block-storage
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: postgres-backup
