---
# Single replica: fine on the current one-node cluster. Switch to a
# DaemonSet (one Alloy per node) if a second node is ever added, so log
# tailing/cadvisor scraping don't have to cross node boundaries.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  labels:
    app: alloy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.4.3
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 12345
              name: http
          envFrom:
            - secretRef:
                name: grafana-cloud
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: data
              mountPath: /var/lib/alloy/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: alloy-config
        # Positions/WAL state only - fine to lose on pod restart (single
        # replica, no persistence guarantees needed for a collector).
        - name: data
          emptyDir: {}
