apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
data:
  config.alloy: |
    // Grafana Alloy config: ships logs -> Loki, metrics -> Prometheus,
    // traces -> Tempo, all on Grafana Cloud. Credentials come from the
    // `grafana-cloud` Secret (see docs/superpowers/plans/2026-07-07-18-production-hardening.md),
    // injected as env vars on the container and read here via env().

    // ---- Job 1: pod log tailing -> Loki -----------------------------------
    // Discovers pods cluster-wide via the k8s API, but the discovery.relabel
    // below restricts what's actually tailed to the `brdgme` namespace (the
    // only namespace in this cluster - web/bot/operator/game
    // services/NATS/CNPG postgres all land here via
    // k8s/prod/app/kustomization.yaml's top-level `namespace: brdgme`,
    // verified 2026-07-09) and drops Alloy's own container. Cut 2026-07-09:
    // previously tailed ALL pods in ALL namespaces (including kube-system)
    // with zero filtering, which blew through the Grafana Cloud free-tier
    // log quota within hours and OOM-looped Alloy buffering the remote_write
    // backlog. Label set is deliberately limited to namespace/pod/container/
    // app (low cardinality) - structured fields the app already emits
    // (trace_id, game_id, etc.) stay in the log body and are queried via
    // LogQL JSON parsing, not promoted to labels.

    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "brdgme"
        action        = "keep"
      }
      rule {
        // Alloy tailing its own logs is a feedback loop: during an outage
        // Alloy's own error spam about the outage would itself count
        // against the log quota it's trying to protect.
        source_labels = ["__meta_kubernetes_pod_container_name"]
        regex         = "alloy"
        action        = "drop"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.write.grafana_cloud.receiver]
    }

    loki.write "grafana_cloud" {
      endpoint {
        url = env("LOKI_URL")
        basic_auth {
          username = env("LOKI_USER")
          password = env("GC_TOKEN")
        }
      }
    }

    // ---- Job 2: metrics -> Prometheus --------------------------------------

    // 2a. Annotation-discovered pods: matches k8s/base/web/deployment.yaml's
    // `prometheus.io/scrape`/`port`/`path` annotations (port 9090, /metrics).
    // This is generic, not web-specific: any pod carrying the same three
    // annotations is picked up automatically - EXCEPT CNPG instance pods,
    // which are explicitly excluded below and scraped by their own job
    // (2b) so a tight metric_relabel keep-list can be scoped to just CNPG's
    // series without touching web's (or any other annotated pod's) metrics.
    discovery.relabel "annotated_scrape" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }
      rule {
        // CNPG instance pods carry this standard label (see 2b below) -
        // excluded here so they're only scraped once, via the
        // CNPG-specific job that applies the tight keep-list.
        source_labels = ["__meta_kubernetes_pod_label_cnpg_io_cluster"]
        regex         = ".+"
        action        = "drop"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
      }
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        replacement   = "$1:$2"
        target_label  = "__address__"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    }

    prometheus.scrape "annotated_pods" {
      targets    = discovery.relabel.annotated_scrape.output
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }

    // 2b. CNPG instance pods (port 9187, /metrics): onboarded via
    // `.spec.inheritedMetadata.annotations` on the `postgres` Cluster CR
    // (k8s/prod/app/postgres-patch.yaml, added 2026-07-09) setting the same
    // `prometheus.io/scrape`/`port` annotations the generic job above looks
    // for - CNPG propagates `inheritedMetadata` onto every pod it creates
    // for the Cluster, including the standard `cnpg.io/cluster` label used
    // to identify/exclude them from 2a above. Scraped separately (rather
    // than folding into 2a) so the metric_relabel keep-list below can be
    // scoped to just CNPG's series - keeping web's axum/login metrics
    // unfiltered.
    //
    // Series kept, for the "CNPG backup freshness" alert
    // (docs/superpowers/plans/2026-07-07-18-production-hardening.md):
    // cnpg_collector_last_available_backup_timestamp,
    // cnpg_collector_last_failed_backup_timestamp,
    // cnpg_collector_first_recoverability_point (all three are CNPG core
    // collector metrics, built in - not from the default-monitoring
    // ConfigMap's custom queries - on by default; deprecated as of CNPG
    // 1.26 in favour of plugin-native backup status but documented as
    // still populated for object-store-backed backups, which is what this
    // cluster uses via the barman-cloud plugin - see the plan doc note for
    // confidence caveats), and cnpg_collector_pg_wal_archive_status for WAL
    // archiving health.
    discovery.relabel "annotated_scrape_cnpg" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_cnpg_io_cluster"]
        regex         = ".+"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
      }
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        replacement   = "$1:$2"
        target_label  = "__address__"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    }

    prometheus.scrape "cnpg_pods" {
      targets    = discovery.relabel.annotated_scrape_cnpg.output
      forward_to = [prometheus.relabel.cnpg_filter.receiver]
    }

    prometheus.relabel "cnpg_filter" {
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]

      rule {
        source_labels = ["__name__"]
        regex         = "cnpg_collector_last_available_backup_timestamp|cnpg_collector_last_failed_backup_timestamp|cnpg_collector_first_recoverability_point|cnpg_collector_pg_wal_archive_status"
        action        = "keep"
      }
    }

    // 2c. cAdvisor (node/container resource metrics, for the "Node pressure"
    // alert). Scraped by proxying through the API server, same pattern
    // kube-prometheus-stack uses, since kubelets aren't otherwise routable
    // from in-cluster pods without node network access.
    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.relabel "nodes_cadvisor" {
      targets = discovery.kubernetes.nodes.targets

      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc:443"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/$1/proxy/metrics/cadvisor"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }
    }

    prometheus.scrape "cadvisor" {
      targets    = discovery.relabel.nodes_cadvisor.output
      forward_to = [prometheus.relabel.cadvisor_filter.receiver]

      scheme            = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"

      tls_config {
        ca_file     = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        server_name = "kubernetes"
      }
    }

    // cAdvisor ships its full series set (network/blkio/per-cgroup, etc.)
    // with no filtering - the main metric-series blower against the
    // free-tier quota. Keep only what the planned alerts/capacity checks
    // need (2026-07-09 cut). No kube-state-metrics in this cluster, so
    // machine_memory_bytes (node's total physical memory, no `container`
    // label) is the "Node pressure" alert's allocatable-memory denominator
    // instead of `kube_node_status_allocatable` - see the plan doc note.
    prometheus.relabel "cadvisor_filter" {
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]

      rule {
        source_labels = ["__name__"]
        regex         = "container_memory_working_set_bytes|container_cpu_usage_seconds_total|machine_memory_bytes|container_fs_usage_bytes|container_fs_limit_bytes"
        action        = "keep"
      }
      rule {
        // Drop cgroup-hierarchy rows (empty `container` label - the
        // pod/node aggregate rows cAdvisor also emits for the four
        // per-container metrics above). machine_memory_bytes never carries
        // a `container` label and is deliberately excluded from this
        // regex's name-alternation so it survives.
        source_labels = ["__name__", "container"]
        regex         = "(container_memory_working_set_bytes|container_cpu_usage_seconds_total|container_fs_usage_bytes|container_fs_limit_bytes);"
        action        = "drop"
      }
    }

    // 2c-2. Kubelet /metrics (NOT /metrics/cadvisor) - PVC fullness for the
    // "Node pressure" alert's ">85% full" PVC clause. Mirrors the cAdvisor
    // node-discovery/proxy/auth pattern above.
    discovery.relabel "nodes_kubelet" {
      targets = discovery.kubernetes.nodes.targets

      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc:443"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/$1/proxy/metrics"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }
    }

    prometheus.scrape "kubelet" {
      targets    = discovery.relabel.nodes_kubelet.output
      forward_to = [prometheus.relabel.kubelet_filter.receiver]

      scheme            = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"

      tls_config {
        ca_file     = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        server_name = "kubernetes"
      }
    }

    prometheus.relabel "kubelet_filter" {
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]

      rule {
        source_labels = ["__name__"]
        regex         = "kubelet_volume_stats_available_bytes|kubelet_volume_stats_capacity_bytes"
        action        = "keep"
      }
    }

    // 2d. Alloy self-monitoring: `up`/`alloy_build_info` feed the heartbeat
    // / no-data alert (docs/superpowers/plans/2026-07-07-18-production-hardening.md).
    prometheus.scrape "alloy_self" {
      targets = [{"__address__" = "localhost:12345"}]

      forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }

    prometheus.remote_write "grafana_cloud" {
      endpoint {
        url = env("PROM_URL")
        basic_auth {
          username = env("PROM_USER")
          password = env("GC_TOKEN")
        }
      }

      // Bound the on-disk WAL (emptyDir at /var/lib/alloy/data). A Grafana
      // Cloud metrics-quota outage on 2026-07-09 blocked remote_write for a
      // while, and with no bound here the WAL accumulated ~282 segments -
      // replaying all of it on container start blew past the 256Mi memory
      // limit in ~3 seconds, OOM-crash-looping the pod. The memory limit
      // stays at 256Mi (cluster capacity is tight), so instead the WAL is
      // truncated aggressively: losing backlogged metrics during an export
      // outage is acceptable for this tiny agent.
      wal {
        truncate_frequency  = "15m"
        min_keepalive_time  = "5m"
        max_keepalive_time  = "1h"
      }
    }

    // ---- Job 3: OTLP traces -> Tempo (disabled 2026-07-16, backlog #41b) --
    // The Tempo/Grafana Cloud exporter was stuck in the #32 "last resolver
    // error: produced zero addresses" retry-and-drop loop, backing up its
    // sending queue and OOMKilling alloy at the 256Mi memory limit. Removed
    // here rather than raising the limit. Revert this commit to re-enable
    // once the #32 exporter issue / Grafana Cloud quota is resolved.
