name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    env:
      SQLX_OFFLINE: "true"
      DATABASE_URL: "postgres://postgres:postgres@localhost/brdgme"
      REDIS_URL: "redis://localhost:6379"
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brdgme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude web --all-targets -- -D warnings
      - run: cargo clippy -p web --all-targets --features ssr -- -D warnings
      - run: cargo test --workspace --exclude web
      - run: cargo test -p web --features ssr

  cargo-deny:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install kubeconform
        run: |
          curl -sL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz
          tar xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
      - name: Install kustomize
        run: |
          curl -sL -o /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.8.1/kustomize_v5.8.1_linux_amd64.tar.gz
          tar xzf /tmp/kustomize.tar.gz -C /usr/local/bin kustomize
      - name: Validate k8s/dev
        run: |
          kustomize build k8s/dev | kubeconform \
            -summary -strict \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas
      - name: Validate k8s/prod
        run: |
          kustomize build k8s/prod | kubeconform \
            -summary -strict \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas

  e2e:
    runs-on: ubuntu-latest
    env:
      E2E_DATABASE_URL: "postgres://postgres:postgres@localhost/brdgme_e2e"
      REDIS_URL: "redis://localhost:6379"
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brdgme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos,wasm-bindgen-cli@0.2.121,sqlx-cli
      - name: Install wasm-opt
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # PLAYWRIGHT_BROWSERS_PATH is unset here (unlike the devenv
          # sandbox), so CI downloads its own browser; key on the pinned
          # @playwright/test version (see end2end/package.json).
          key: playwright-${{ runner.os }}-1.60.0
      - working-directory: rust/web/end2end
        run: npm ci
      - working-directory: rust/web/end2end
        run: npx playwright install chromium --with-deps
      - working-directory: rust/web/end2end
        run: ./run.sh

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: brdgme-go/Dockerfile
          target: go-test
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: [test-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: web
            target: web
          - image: migrate
            target: migrate
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/brdgme/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: rust/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-rust-games:
    needs: [test-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: acquire-1
            target: acquire-1
          - image: lost-cities-1
            target: lost-cities-1
          - image: lost-cities-2
            target: lost-cities-2
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/brdgme/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: rust/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-legacy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: web-legacy
            file: web/Dockerfile
          - image: websocket
            file: websocket/Dockerfile
          - image: api
            file: rust/api/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/brdgme/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-go-games:
    needs: [test-go]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Go games
        env:
          OWNER: ${{ github.repository_owner }}
          PUSH: ${{ github.ref == 'refs/heads/master' }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          PUSH_FLAG=""
          if [ "${PUSH}" = "true" ]; then PUSH_FLAG="--push"; fi
          for GAME in \
            age-of-war-1 battleship-1 category-5-1 cathedral-1 farkle-1 \
            for-sale-1 greed-1 liars-dice-1 love-letter-1 modern-art-1 \
            no-thanks-1 roll-through-the-ages-1 splendor-1 sushi-go-1 \
            sushizock-1 texas-holdem-1 zombie-dice-1; do
            TAGS="-t ghcr.io/${OWNER}/brdgme/${GAME}:sha-${SHORT_SHA}"
            if [ "${PUSH}" = "true" ]; then
              TAGS="${TAGS} -t ghcr.io/${OWNER}/brdgme/${GAME}:latest"
            fi
            docker buildx build \
              --target "${GAME}" \
              ${TAGS} \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              ${PUSH_FLAG} \
              -f brdgme-go/Dockerfile \
              .
          done
