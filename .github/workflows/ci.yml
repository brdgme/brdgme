name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single gate job computing which path groups changed, so every other job
  # can skip with an `if:` instead of the workflow-level `on.paths` filter
  # (which would make GitHub report skipped jobs as *missing*, breaking
  # required-status checks that name them). A skipped job here still reports
  # a (skipped) status, which satisfies required checks.
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      go: ${{ steps.filter.outputs.go }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'rust/**'
              - 'docker-bake.hcl'
              - '.github/workflows/ci.yml'
            go:
              - 'brdgme-go/**'
              - 'go.mod'
              - '.github/workflows/ci.yml'
            k8s:
              - 'k8s/**'
              - '.github/workflows/ci.yml'

  test-rust:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    env:
      SQLX_OFFLINE: "true"
      DATABASE_URL: "postgres://postgres:postgres@localhost/brdgme"
      NATS_URL: "nats://localhost:4222"
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brdgme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      # GitHub Actions `services:` containers can't take extra CLI args (no
      # way to append `-js` to the image's default command), so NATS is
      # started as a plain step instead - JetStream needs that flag.
      - name: Start NATS (JetStream)
        run: |
          docker run -d --name nats -p 4222:4222 -p 8222:8222 \
            nats:2.11-alpine -js -sd /data -m 8222
          for i in $(seq 30); do
            curl -sf http://localhost:8222/healthz && break
            sleep 1
          done
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli
      - name: Run migrations
        run: sqlx migrate run --source web/migrations
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude web --all-targets -- -D warnings
      - run: cargo clippy -p web --all-targets --features ssr -- -D warnings
      - name: Check .sqlx cache is up to date
        working-directory: rust/web
        run: cargo sqlx prepare --check -- --tests --features ssr --all-targets
      - run: cargo test --workspace --exclude web
      - run: cargo test -p web --features ssr

  cargo-deny:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  kubeconform:
    needs: [changes]
    if: needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install kubeconform
        run: |
          curl -sL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz
          tar xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
      - name: Install kustomize
        run: |
          curl -sL -o /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.8.1/kustomize_v5.8.1_linux_amd64.tar.gz
          tar xzf /tmp/kustomize.tar.gz -C /usr/local/bin kustomize
      - name: Validate k8s/dev
        run: |
          kustomize build k8s/dev | kubeconform \
            -summary -strict \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas
      - name: Validate k8s/prod
        run: |
          kustomize build k8s/prod | kubeconform \
            -summary -strict \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas

  e2e:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    # Flaky (hydration-race in the login flow, still being tracked down) -
    # don't let it block merges/deploys while that's investigated.
    continue-on-error: true
    env:
      E2E_DATABASE_URL: "postgres://postgres:postgres@localhost/brdgme_e2e"
      NATS_URL: "nats://localhost:4222"
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brdgme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      # GitHub Actions `services:` containers can't take extra CLI args (no
      # way to append `-js` to the image's default command), so NATS is
      # started as a plain step instead - JetStream needs that flag.
      - name: Start NATS (JetStream)
        run: |
          docker run -d --name nats -p 4222:4222 -p 8222:8222 \
            nats:2.11-alpine -js -sd /data -m 8222
          for i in $(seq 30); do
            curl -sf http://localhost:8222/healthz && break
            sleep 1
          done
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos,wasm-bindgen-cli@0.2.121,sqlx-cli
      - name: Install wasm-opt
        run: sudo apt-get update && sudo apt-get install -y binaryen
      # cargo-leptos's own dart-sass auto-download has been seen to fetch an
      # incomplete archive on this runner image (wrapper script present, but
      # the bundled `dart` binary it execs missing), so install dart-sass
      # explicitly onto PATH the same way rust/Dockerfile's web-builder stage
      # does, bypassing cargo-leptos's installer entirely.
      - name: Install dart-sass
        run: |
          curl -L https://github.com/sass/dart-sass/releases/download/1.101.0/dart-sass-1.101.0-linux-x64.tar.gz | tar -xz
          sudo mv dart-sass /usr/local/lib/dart-sass
          sudo ln -s /usr/local/lib/dart-sass/sass /usr/local/bin/sass
          sudo chmod +x /usr/local/bin/sass
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # PLAYWRIGHT_BROWSERS_PATH is unset here (unlike the devenv
          # sandbox), so CI downloads its own browser; key on the pinned
          # @playwright/test version (see end2end/package.json).
          key: playwright-${{ runner.os }}-1.61.1
      - working-directory: rust/web/end2end
        run: npm ci
      - working-directory: rust/web/end2end
        run: npx playwright install chromium --with-deps
      - working-directory: rust/web/end2end
        run: ./run.sh

  test-go:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: brdgme-go/Dockerfile
          target: go-test
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # All images from rust/Dockerfile (web, migrate, games) are built in one
  # bake invocation so the shared cargo-chef/builder stages compile once,
  # instead of once per image as the old per-image matrix did. Layer cache
  # lives in ghcr (type=registry) rather than the GHA cache backend: the
  # rust layers blow straight through the 10GB GHA cache quota, which
  # caused constant eviction and cold builds.
  build-rust:
    needs: [changes, test-rust]
    # `test-rust` reports "skipped" (not "success") when the gate skips it,
    # so this can't rely on the default implicit `success()` check - it
    # would skip build-rust too. Proceed on skip, still block on a real
    # failure/cancellation.
    if: |
      needs.changes.outputs.rust == 'true' &&
      needs.test-rust.result != 'failure' &&
      needs.test-rust.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      # Unconditional (unlike the push) so PR builds can pull the layer
      # cache from ghcr.
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set bake variables
        run: |
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
      - uses: docker/bake-action@v6
        with:
          source: .
          files: docker-bake.hcl
          push: ${{ github.ref == 'refs/heads/master' }}
        env:
          PUSH_LATEST: ${{ github.ref == 'refs/heads/master' }}
          WRITE_CACHE: ${{ github.ref == 'refs/heads/master' }}
      # Sentry debug-file upload (next two steps): runs only on master
      # pushes when SENTRY_AUTH_TOKEN is configured; skipped cleanly
      # otherwise (e.g. fork PRs, or before the secret exists).
      #
      # The web-debug bake must run in this same job, right after the main
      # bake step above, so it hits the BuildKit cache from the web image
      # just built - the wasm build_id is minted fresh per wasm-split
      # invocation, and only the shared layer cache guarantees the
      # extracted web.debug carries the same build_id as the pushed image.
      - name: Extract wasm debug file
        if: github.ref == 'refs/heads/master' && env.SENTRY_AUTH_TOKEN != ''
        uses: docker/bake-action@v6
        with:
          source: .
          files: docker-bake.hcl
          targets: web-debug
      - name: Upload debug files to Sentry
        if: github.ref == 'refs/heads/master' && env.SENTRY_AUTH_TOKEN != ''
        env:
          # Slugs confirmed per docs/superpowers/plans/2026-07-15-ws3-sentry.md
          # (org `brdgme`; browser project `web-javascript` receives debug-file uploads).
          SENTRY_ORG: brdgme
          SENTRY_PROJECT: web-javascript
        run: |
          sudo curl -sL -o /usr/local/bin/sentry-cli \
            https://downloads.sentry-cdn.com/sentry-cli/3.6.0/sentry-cli-Linux-x86_64
          sudo chmod +x /usr/local/bin/sentry-cli
          sentry-cli debug-files upload --project "$SENTRY_PROJECT" out/web-debug/web.debug
          sentry-cli releases new --project "$SENTRY_PROJECT" "sha-${SHORT_SHA}"
          sentry-cli releases finalize --project "$SENTRY_PROJECT" "sha-${SHORT_SHA}"

  build-go-games:
    needs: [changes, test-go]
    # See build-rust's comment: proceed when test-go was skipped, still
    # block on a real failure/cancellation.
    if: |
      needs.changes.outputs.go == 'true' &&
      needs.test-go.result != 'failure' &&
      needs.test-go.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Go games
        env:
          OWNER: ${{ github.repository_owner }}
          PUSH: ${{ github.ref == 'refs/heads/master' }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          PUSH_FLAG=""
          if [ "${PUSH}" = "true" ]; then PUSH_FLAG="--push"; fi
          for GAME in \
            age-of-war-1 battleship-1 category-5-1 cathedral-1 farkle-1 \
            for-sale-1 greed-1 liars-dice-1 love-letter-1 modern-art-1 \
            no-thanks-1 roll-through-the-ages-1 splendor-1 sushi-go-1 \
            sushizock-1 texas-holdem-1 zombie-dice-1; do
            TAGS="-t ghcr.io/${OWNER}/brdgme/${GAME}:sha-${SHORT_SHA}"
            if [ "${PUSH}" = "true" ]; then
              TAGS="${TAGS} -t ghcr.io/${OWNER}/brdgme/${GAME}:latest"
            fi
            docker buildx build \
              --target "${GAME}" \
              ${TAGS} \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              ${PUSH_FLAG} \
              -f brdgme-go/Dockerfile \
              .
          done
