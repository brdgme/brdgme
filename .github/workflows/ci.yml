name: CI

on:
  push:
  pull_request:

jobs:
  test-rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    env:
      SQLX_OFFLINE: "true"
      DATABASE_URL: "postgres://postgres:postgres@localhost/brdgme"
      REDIS_URL: "redis://localhost:6379"
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brdgme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude web --all-targets -- -D warnings
      - run: cargo clippy -p web --all-targets --features ssr -- -D warnings
      - run: cargo test --workspace --exclude web
      - run: cargo test -p web --features ssr

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: brdgme-go/Dockerfile
          target: go-test
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: [test-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/brdgme/web
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: rust/Dockerfile
          target: web
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/metadata-action@v5
        id: meta-migrate
        with:
          images: ghcr.io/${{ github.repository_owner }}/brdgme/migrate
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: rust/Dockerfile
          target: migrate
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta-migrate.outputs.tags }}
          labels: ${{ steps.meta-migrate.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-rust-games:
    needs: [test-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta-acquire-1
        with:
          images: ghcr.io/${{ github.repository_owner }}/brdgme/acquire-1
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: rust/Dockerfile
          target: acquire-1
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta-acquire-1.outputs.tags }}
          labels: ${{ steps.meta-acquire-1.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/metadata-action@v5
        id: meta-lost-cities-1
        with:
          images: ghcr.io/${{ github.repository_owner }}/brdgme/lost-cities-1
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: rust/Dockerfile
          target: lost-cities-1
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta-lost-cities-1.outputs.tags }}
          labels: ${{ steps.meta-lost-cities-1.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/metadata-action@v5
        id: meta-lost-cities-2
        with:
          images: ghcr.io/${{ github.repository_owner }}/brdgme/lost-cities-2
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: rust/Dockerfile
          target: lost-cities-2
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta-lost-cities-2.outputs.tags }}
          labels: ${{ steps.meta-lost-cities-2.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-legacy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: web-legacy
            file: web/Dockerfile
          - image: websocket
            file: websocket/Dockerfile
          - image: api
            file: rust/api/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/brdgme/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-go-games:
    needs: [test-go]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Go games
        env:
          OWNER: ${{ github.repository_owner }}
          PUSH: ${{ github.ref == 'refs/heads/master' }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          PUSH_FLAG=""
          if [ "${PUSH}" = "true" ]; then PUSH_FLAG="--push"; fi
          for GAME in \
            age-of-war-1 battleship-1 category-5-1 cathedral-1 farkle-1 \
            for-sale-1 greed-1 liars-dice-1 love-letter-1 modern-art-1 \
            no-thanks-1 roll-through-the-ages-1 splendor-1 sushi-go-1 \
            sushizock-1 texas-holdem-1 zombie-dice-1; do
            TAGS="-t ghcr.io/${OWNER}/brdgme/${GAME}:sha-${SHORT_SHA}"
            if [ "${PUSH}" = "true" ]; then
              TAGS="${TAGS} -t ghcr.io/${OWNER}/brdgme/${GAME}:latest"
            fi
            docker buildx build \
              --target "${GAME}" \
              ${TAGS} \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              ${PUSH_FLAG} \
              -f brdgme-go/Dockerfile \
              .
          done
