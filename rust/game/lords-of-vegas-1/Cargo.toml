[package]
name = "lords-of-vegas-1"
version = "0.1.0"
authors = ["Michael Alexander <beefsack@gmail.com>"]
edition = "2024"

[dependencies]
brdgme_cmd = { path = "../../lib/cmd" }
brdgme_fuzz = { path = "../../tools/fuzz" }
brdgme_color = { path = "../../lib/color" }
brdgme_game = { path = "../../lib/game" }
brdgme_markup = { path = "../../lib/markup" }
thiserror = "2.0.18"
lazy_static = "1.5.0"
rand = "0.10.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["full"] }

[dev-dependencies]
brdgme_cmd = { path = "../../lib/cmd", features = ["test-support"] }
