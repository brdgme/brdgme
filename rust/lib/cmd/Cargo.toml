[package]
name = "brdgme_cmd"
version = "0.1.0"
publish = false
authors = ["Michael Alexander <beefsack@gmail.com>"]
edition = "2024"

[dependencies]
brdgme_color = { path = "../color" }
brdgme_game = { path = "../game" }
brdgme_markup = { path = "../markup" }
time = { version = "0.3", features = ["serde", "parsing", "formatting", "macros"] }
thiserror = "2.0.18"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
term_size = "0.3.2"
warp = { version = "0.4.3", features = ["server"], optional = true }
tokio = { version = "1", features = ["signal"], optional = true }
sentry = { version = "0.48", optional = true }
env_logger = "0.11.11"
rand = "0.10.2"

[features]
default = ["http-server"]
http-server = ["warp", "tokio", "sentry"]
test-support = []
