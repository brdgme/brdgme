---
apiVersion: ctlptl.dev/v1alpha1
kind: Registry
name: kind-registry
port: 5000
---
apiVersion: ctlptl.dev/v1alpha1
kind: Cluster
product: kind
registry: kind-registry
kindV1Alpha4Cluster:
  kind: Cluster
  apiVersion: kind.x-k8s.io/v1alpha4
  # Default CNI (kindnet) is disabled - Cilium is installed separately by
  # scripts/setup-kind-cluster.sh so Gateway API support matches production.
  networking:
    disableDefaultCNI: true
  nodes:
  - role: control-plane
    image: kindest/node:v1.34.0
    extraPortMappings:
    - containerPort: 31080
      hostPort: 8080
  # Registry access for kind-registry:5000 is configured via a
  # containerd certs.d hosts.toml written onto the node by
  # scripts/setup-kind-cluster.sh (see kind's local-registry docs), not via
  # containerdConfigPatches: the node image's containerd already sets
  # `config_path`, and `registry.mirrors` cannot be set at the same time as
  # `config_path` (containerd rejects the config: "mirrors cannot be set
  # when config_path is provided").
