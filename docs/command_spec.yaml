OneOf:
  - Chain:
      - Doc:
          name: buy
          desc: buy shares
          spec:
            Token: buy
      - Chain:
          - Space
          - Doc:
              name: #
              desc: number of shares to buy
              spec:
                Int:
                  min: 1
                  max: 3
      - Chain:
          - Space
          - Doc:
              name: corp
              desc: the corporation to buy shares in
              spec:
                Enum:
                  values:
                    - Worldwide
                    - Sackson
                    - Festival
                    - Imperial
                    - American
                    - Continental
                    - Tower
                  exact: false
  - Doc:
      name: done
      desc: finish buying shares and end your turn
      spec:
        Token: done
